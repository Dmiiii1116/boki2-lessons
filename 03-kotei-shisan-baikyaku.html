<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>固定資産の売却 | 簿記2級</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f8f7f4;color:#1a1a1a;padding:16px;min-height:100vh}
.app{max-width:600px;margin:0 auto}
.pbar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.plbl{font-size:12px;color:#888;min-width:60px}
.dots{flex:1;display:flex;gap:3px}
.dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0;transition:background .3s}
.dot.act{background:#BA7517}.dot.dn{background:#1D9E75}
.slbl{font-size:12px;color:#888;min-width:36px;text-align:right}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;display:inline-block;margin-bottom:12px}
.ba{background:#FAEEDA;color:#854F0B}.bt{background:#E1F5EE;color:#0F6E56}.bp{background:#EEEDFE;color:#3C3489}.br{background:#FAEBEB;color:#8B2323}
.icon{width:48px;height:48px;border-radius:14px;background:#f3f3f1;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
h1{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:12px}
h2{font-size:17px;font-weight:600;line-height:1.5;margin-bottom:8px;color:#1a1a1a}
.body{font-size:15px;line-height:1.7;color:#555}
button{font-size:15px;font-weight:600;padding:14px 24px;border-radius:12px;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#1a1a1a;min-height:48px;-webkit-appearance:none;transition:opacity .15s}
button:active{opacity:.7}
.btn-r{float:right;margin-top:16px}
.btn-w{width:100%;margin-top:12px}
.opt{width:100%;text-align:left;padding:14px 16px;margin:6px 0;border-radius:12px;font-size:15px;cursor:pointer;border:1.5px solid #e5e5e5;background:#fafafa;color:#1a1a1a;min-height:52px;-webkit-appearance:none;line-height:1.5;transition:opacity .15s}
.opt:active{opacity:.7}.opt:disabled{cursor:default}
.opt.ok{background:#E1F5EE!important;border-color:#639922!important;color:#1a4d1a!important}
.opt.ng{background:#FCEBEB!important;border-color:#A32D2D!important;color:#6b1a1a!important}
.tbl{border:1px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:14px}
.tbl-g{display:grid;grid-template-columns:1fr 1px 1fr}
.tbl-s{padding:12px;background:#fafafa}
.tbl-d{background:#eee}
.ent{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px;opacity:0;transition:opacity .4s}
.ent:last-child{border-bottom:none}
.ent.on{opacity:1}
.calc{background:#f8f7f4;border-radius:12px;padding:14px;margin-top:12px;border:1px solid #eee}
.cr{display:flex;justify-content:space-between;padding:4px 0;font-size:14px}
.cr.tot{border-top:1px solid #ddd;margin-top:4px;padding-top:8px;font-weight:700}
.hint{background:#f0faf5;border-radius:12px;padding:14px;border:1px solid #b8e6cc;margin-top:12px}
.fb{padding:14px;border-radius:12px;margin-top:12px}
.fb.ok{background:#e6f9f0;border:1px solid #639922}
.fb.ng{background:#fef0f0;border:1px solid #A32D2D}
.pb{height:4px;background:#eee;border-radius:2px;overflow:hidden;flex:1}
.pbf{height:100%;background:#BA7517;border-radius:2px;transition:width .3s}
.score{font-size:56px;font-weight:700;text-align:center;padding:8px 0}
.sum{background:#f8f7f4;border-radius:12px;padding:16px;margin:16px 0}
.sum ul{padding-left:20px}.sum li{font-size:14px;line-height:2.2;color:#555}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.up{animation:up .25s ease}
</style>
</head>
<body>
<div class="app">
  <div class="pbar">
    <span class="plbl" id="ph">イントロ</span>
    <div class="dots" id="dots"></div>
    <span class="slbl" id="sl">1/11</span>
  </div>
  <div id="ct"></div>
</div>
<script>
const TOTAL=11;
const PH=['イントロ','STEP 1','STEP 2','STEP 3','STEP 4','STEP 5','仕訳','Q1','Q2','Q3','結果'];
const ST=[null,
  {badge:'STEP 1',bc:'ba',icon:'💻',title:'「3年使ったPC、そろそろ売ろう」',body:'山田さんは3年前に100,000円で購入したPC（定額法・耐用年数4年）を40,000円で売却することに。どう仕訳する？',ex:null},
  {badge:'STEP 2',bc:'ba',icon:'🧮',title:'まず「帳簿価額」を計算する',body:'3年分の減価償却累計額：25,000円×3年＝75,000円。帳簿価額＝100,000－75,000＝25,000円。PCの「簿記上の価値」は25,000円しかない。',ex:'calc'},
  {badge:'STEP 3',bc:'bt',icon:'📈',title:'売却価格40,000円 ＞ 帳簿価額25,000円 → 売却益！',body:'差額15,000円（40,000－25,000）が「固定資産売却益」。帳簿より高く売れた＝利益。収益なので貸方に計上する。',ex:null},
  {badge:'STEP 4',bc:'br',icon:'📉',title:'逆の場合は「固定資産売却損」',body:'もし20,000円で売れた場合、差額5,000円（25,000－20,000）が「固定資産売却損」。損失なので借方に計上。',ex:null},
  {badge:'STEP 5',bc:'bt',icon:'🧾',title:'仕訳のポイント：累計額を取り崩す',body:'売却時は「備品」と「減価償却累計額」を両方消す。累計額はもともと貸方にあるので、借方に持ってきて相殺する。これが間接法の後処理。',ex:null},
];
const QZ=[
  {q:'固定資産の「帳簿価額」の計算式は？',opts:['取得価額 ー 売却価格','取得価額 ー 減価償却累計額','売却価格 ー 減価償却累計額','取得価額 ÷ 耐用年数'],ans:1,hint:'帳簿価額＝取得価額－減価償却累計額。「まだ費用化されていない部分」がB/S上の価値。'},
  {q:'取得価額100,000円・減価償却累計額75,000円のPCを40,000円で売却。売却損益は？',opts:['売却損35,000円','売却益40,000円','売却益15,000円','売却損25,000円'],ans:2,hint:'帳簿価額25,000円。売却価格40,000－帳簿価額25,000＝売却益15,000円。'},
  {q:'【引っ掛け】固定資産の売却仕訳で、減価償却累計額はどちらに記録する？',opts:['貸方（評価額の減少）','借方（取消・相殺のため）','借方（費用として）','貸方（収益として）'],ans:1,hint:'累計額はもともとB/S貸方の勘定。売却時に取り消すには借方に持ってきて相殺する。'}
];
let cur=0,sc=0,ok=false,ch=-1;
function dots(){const d=document.getElementById('dots');d.innerHTML='';for(let i=0;i<TOTAL;i++){const e=document.createElement('div');e.className='dot'+(i===cur?' act':i<cur?' dn':'');d.appendChild(e);}}
function render(){
  document.getElementById('ph').textContent=PH[cur];
  document.getElementById('sl').textContent=(cur+1)+'/'+TOTAL;
  dots();const c=document.getElementById('ct');
  if(cur===0){c.innerHTML=`<div class="card up" style="text-align:center;padding:28px 16px">
    <p style="font-size:12px;color:#888;letter-spacing:.08em;margin-bottom:12px">簿記2級 × 固定資産</p>
    <h1>PCを売った。帳簿価額より<br>高く売れたらどうなる？</h1>
    <p class="body" style="margin:12px 0 20px">売却損益の計算から仕訳まで。<strong style="color:#1a1a1a">減価償却累計額の取り崩し</strong>が今日のキモ。</p>
    <button class="btn-w" onclick="go(1)">学習スタート →</button></div>`;return;}
  if(cur>=1&&cur<=5){
    const s=ST[cur];let ex='';
    if(s.ex==='calc')ex=`<div class="calc">
      <div class="cr"><span style="color:#555">取得価額</span><span>100,000円</span></div>
      <div class="cr"><span style="color:#A32D2D">減価償却累計額（3年分）</span><span style="color:#A32D2D">－75,000円</span></div>
      <div class="cr tot"><span>帳簿価額</span><span style="color:#BA7517">25,000円</span></div></div>`;
    c.innerHTML=`<div class="card up"><span class="badge ${s.bc}">${s.badge}</span>
    <div style="display:flex;gap:14px;align-items:flex-start">
      <div class="icon">${s.icon}</div>
      <div style="flex:1"><h2>${s.title}</h2><p class="body">${s.body}</p></div>
    </div>${ex}
    <div style="overflow:hidden"><button class="btn-r" onclick="go(${cur+1})">${cur===5?'仕訳を見る →':'次へ →'}</button></div></div>`;return;}
  if(cur===6){c.innerHTML=`<div class="card up">
    <span class="badge bp">仕訳アニメーション</span>
    <h2 style="margin-bottom:4px">固定資産の売却仕訳</h2>
    <p style="font-size:13px;color:#888;margin-bottom:14px">取得価額100,000円・累計額75,000円のPCを40,000円で売却</p>
    <div class="tbl"><div class="tbl-g">
      <div class="tbl-s"><p style="font-size:11px;color:#888;text-align:center;margin-bottom:8px">借方（かりかた）</p>
        <div class="ent" id="j1"><span style="font-weight:600">現金</span><span style="color:#BA7517;font-weight:600">40,000</span></div>
        <div class="ent" id="j2"><span style="font-weight:600">減価償却累計額</span><span style="color:#BA7517;font-weight:600">75,000</span></div>
      </div>
      <div class="tbl-d"></div>
      <div class="tbl-s"><p style="font-size:11px;color:#888;text-align:center;margin-bottom:8px">貸方（かしかた）</p>
        <div class="ent" id="j3"><span style="font-weight:600">備品</span><span style="color:#1D9E75;font-weight:600">100,000</span></div>
        <div class="ent" id="j4"><span style="font-weight:600">固定資産売却益</span><span style="color:#1D9E75;font-weight:600">15,000</span></div>
      </div>
    </div></div>
    <div class="hint"><p style="font-size:13px;line-height:1.6"><strong>借貸バランス確認</strong>：借方 40,000＋75,000＝115,000 ／ 貸方 100,000＋15,000＝115,000 ✓</p></div>
    <div style="overflow:hidden"><button class="btn-r" onclick="go(7)">クイズへ →</button></div></div>`;
    setTimeout(()=>{
      setTimeout(()=>{const e=document.getElementById('j1');if(e)e.classList.add('on');},200);
      setTimeout(()=>{const e=document.getElementById('j2');if(e)e.classList.add('on');},500);
      setTimeout(()=>{const e=document.getElementById('j3');if(e)e.classList.add('on');},900);
      setTimeout(()=>{const e=document.getElementById('j4');if(e)e.classList.add('on');},1200);
    },50);return;}
  if(cur>=7&&cur<=9){
    const qi=cur-7,q=QZ[qi];let fb='';
    if(ok){const isOk=ch===q.ans;
      fb=`<div class="fb ${isOk?'ok':'ng'}"><p style="font-size:14px;font-weight:600;color:${isOk?'#0F6E56':'#A32D2D'};margin-bottom:${q.hint?'6px':'0'}">${isOk?'✓ 正解！':`✗ 不正解。正解は「${q.opts[q.ans]}」`}</p>
      ${q.hint?`<p style="font-size:13px;color:#555;line-height:1.6">💡 ${q.hint}</p>`:''}</div>
      <button class="btn-w" onclick="go(${cur+1})" style="margin-top:10px">${qi<2?'次の問題 →':'結果を見る →'}</button>`;}
    c.innerHTML=`<div class="card up">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span class="badge bp" style="margin:0">Q${qi+1}</span>
      <span style="font-size:12px;color:#888">${qi+1}/3問</span>
      <div class="pb"><div class="pbf" style="width:${qi/3*100}%"></div></div></div>
      <p style="font-size:16px;font-weight:600;line-height:1.6;margin-bottom:14px">${q.q}</p>
      <div>${q.opts.map((o,i)=>{let cl='opt';if(ok){if(i===q.ans)cl+=' ok';else if(i===ch)cl+=' ng';}
        return`<button class="${cl}" onclick="ans(${qi},${i})" ${ok?'disabled':''}><span style="color:#aaa;margin-right:8px">${['A','B','C','D'][i]}.</span>${o}</button>`;}).join('')}</div>${fb}</div>`;return;}
  if(cur===10){
    const pct=Math.round(sc/3*100),col=sc===3?'#0F6E56':sc===2?'#BA7517':'#A32D2D';
    c.innerHTML=`<div class="card up" style="text-align:center;padding:24px 16px">
      <span class="badge ${sc===3?'bt':'ba'}" style="margin-bottom:14px">${sc===3?'完璧！':sc===2?'あと少し！':'もう一回！'}</span>
      <div class="score" style="color:${col}">${sc}<span style="font-size:22px;color:#aaa">/3</span></div>
      <p style="color:#888;margin-bottom:18px">${pct}% 正解</p>
      <div class="sum"><p style="font-size:13px;font-weight:600;margin-bottom:8px">今日の要点</p><ul>
        <li>帳簿価額＝取得価額－減価償却累計額</li><li>売却益＝売却価格－帳簿価額（高く売れた場合）</li>
        <li>売却損＝帳簿価額－売却価格（安く売れた場合）</li><li>仕訳：累計額は借方で取り崩す</li>
      </ul></div>
      <button class="btn-w" onclick="rst()">最初からやり直す</button></div>`;}
}
function go(n){cur=n;ok=false;ch=-1;render();}
function ans(qi,i){if(ok)return;ok=true;ch=i;if(i===QZ[qi].ans)sc++;render();}
function rst(){cur=0;sc=0;ok=false;ch=-1;render();}
render();
</script>
</body>
</html>
