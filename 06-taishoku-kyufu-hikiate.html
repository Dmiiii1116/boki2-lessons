<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>退職給付引当金 | 簿記2級</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f8f7f4;--card:#fff;--text:#1a1a1a;--sub:#888;--border:#e5e5e5;--amber:#BA7517;--green:#1D9E75;--red:#A32D2D;--amber-bg:#FAEEDA;--green-bg:#E1F5EE;--purple-bg:#EEEDFE;--blue-bg:#E6F1FB;}
@media(prefers-color-scheme:dark){:root{--bg:#111;--card:#1e1e1e;--text:#f0ede6;--sub:#999;--border:#333;--amber-bg:#412402;--green-bg:#04342C;--purple-bg:#26215C;--blue-bg:#042C53;}}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
.app{max-width:600px;margin:0 auto}
.pbar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.phase{font-size:12px;color:var(--sub);min-width:68px}
.dots{flex:1;display:flex;gap:3px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .3s;flex-shrink:0}
.dot.act{background:var(--amber)}.dot.dn{background:var(--green)}
.slbl{font-size:12px;color:var(--sub);min-width:36px;text-align:right}
.card{background:var(--card);border-radius:16px;padding:20px;border:1px solid var(--border)}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;display:inline-block;margin-bottom:12px}
.ba{background:var(--amber-bg);color:#854F0B}.bt{background:var(--green-bg);color:#0F6E56}.bp{background:var(--purple-bg);color:#3C3489}.bb{background:var(--blue-bg);color:#185FA5}
.ibox{width:52px;height:52px;border-radius:14px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
button{font-family:inherit;font-size:15px;font-weight:600;padding:13px 20px;border-radius:12px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text);min-height:48px;-webkit-appearance:none}
button:active{opacity:.8}
.btn-next{float:right;margin-top:16px}
.btn-full{width:100%;margin-top:12px}
.opt{width:100%;text-align:left;padding:14px 16px;margin:6px 0;border-radius:12px;font-size:15px;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text);min-height:52px;-webkit-appearance:none;line-height:1.5;font-family:inherit}
.opt:disabled{cursor:default}
.opt.oc{background:#E1F5EE!important;border-color:#639922!important;color:#1a4d1a!important}
.opt.ow{background:#FCEBEB!important;border-color:#A32D2D!important;color:#6b1a1a!important}
@media(prefers-color-scheme:dark){.opt.oc{background:#173404!important;border-color:#3B6D11!important;color:#C0DD97!important}.opt.ow{background:#501313!important;border-color:#A32D2D!important;color:#F7C1C1!important}}
.tbl{border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:10px 0}
.tside{padding:12px;background:var(--bg)}
.tdiv{background:var(--border);width:1px}
.jl{opacity:0;transform:translateX(-10px);transition:opacity .5s,transform .5s}
.jr{opacity:0;transform:translateX(10px);transition:opacity .5s,transform .5s}
.jl.sh,.jr.sh{opacity:1;transform:translateX(0)}
.jlbl{font-size:11px;color:var(--sub);background:var(--bg);padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:8px;border:1px solid var(--border)}
.entry{display:flex;justify-content:space-between;padding:8px 0;font-size:14px}
.entry+.entry{border-top:1px solid var(--border)}
.hint-box{background:var(--green-bg);border-radius:12px;padding:14px;border:1px solid #b8e6cc;margin-top:12px}
.feedback{padding:14px;border-radius:12px;margin-top:12px;border:1.5px solid}
.feedback.ok{background:#E1F5EE;border-color:#639922}
.feedback.ng{background:#FCEBEB;border-color:#A32D2D}
@media(prefers-color-scheme:dark){.hint-box{background:var(--green-bg);border-color:#1D5040}.feedback.ok{background:#04342C;border-color:#3B6D11}.feedback.ng{background:#501313;border-color:#A32D2D}}
.pbfill{height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex:1}
.pbbar{height:100%;background:var(--amber);border-radius:2px}
.timeline{display:flex;align-items:flex-start;gap:12px;padding:12px 0;margin-top:12px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:4px}
.tl-line{width:2px;background:var(--border);flex-shrink:0;margin-top:4px}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.su{animation:su .3s ease}
</style>
</head>
<body>
<div class="app">
  <div class="pbar">
    <span class="phase" id="ph">イントロ</span>
    <div class="dots" id="dots"></div>
    <span class="slbl" id="sl">1/11</span>
  </div>
  <div id="content"></div>
</div>
<script>
const TOTAL=11;
const phases=['イントロ','STEP 1','STEP 2','STEP 3','STEP 4','STEP 5','仕訳','Q1','Q2','Q3','結果'];
const stories=[null,
  {badge:'STEP 1',bc:'ba',icon:'🏢',title:'「将来の退職金、今から準備すべき？」',
   body:'社員が30年後に退職したとき、退職金3,000,000円を払う約束がある。でも支払いは30年後。今の決算では何も計上しなくていいの？',ex:null},
  {badge:'STEP 2',bc:'ba',icon:'💡',title:'退職金は「今の労働」への報酬',
   body:'退職金は、30年間働いてくれた対価として払うもの。つまり毎年の労働に対して少しずつ積み上げているはず。会計では「働いた期間」に費用を配分する（発生主義）。',ex:null},
  {badge:'STEP 3',bc:'bt',icon:'📅',title:'毎期末に少しずつ計上する',
   body:'30年間で3,000,000円なら、毎年100,000円ずつ費用に計上する（簡略化）。これが「退職給付費用」。同額を「退職給付引当金」として負債に積み立てる。',ex:'timeline'},
  {badge:'STEP 4',bc:'bt',icon:'💰',title:'実際に退職金を支払うとき',
   body:'30年後に3,000,000円を現金で支払う。このとき積み立ててきた「退職給付引当金」を取り崩す。毎期計上済みなので、退職時の損益への大きな影響はない。',ex:null},
  {badge:'STEP 5',bc:'bb',icon:'🎯',title:'試験のポイント：取り崩し時の仕訳',
   body:'退職金支払時の借方は「退職給付引当金」（引当金の取崩）。「退職給付費用」ではない。引当金があるのに費用計上してしまうと二重計上になる！',ex:null},
];
const quiz=[
  {q:'退職給付引当金を毎期計上する会計上の根拠は？',
   opts:['退職金は支払ったときに費用計上すれば十分','退職金は従業員の労働への報酬であり、労働した期間に費用を配分する','退職金は任意支給なので計上不要','税法上の規定に従うため'],
   ans:1,hint:'発生主義の考え方。退職金は30年分の労働への報酬→毎年少しずつ費用計上するのが正しい。'},
  {q:'退職給付費用500,000円を計上する仕訳で、貸方に来るのは？',
   opts:['退職給付費用','現金','退職給付引当金','未払費用'],
   ans:2,hint:'退職給付費用（費用・借方）/ 退職給付引当金（負債・貸方）。引当金として積み立てるイメージ。'},
  {q:'【引っ掛け】実際に退職金3,000,000円を現金で支払ったときの仕訳で、借方に来るのは？',
   opts:['退職給付費用 3,000,000','退職給付引当金 3,000,000','現金 3,000,000','退職給付費用 3,000,000'],
   ans:1,hint:'支払時は積み立ててきた引当金を取り崩す。「退職給付費用」にすると二重計上になってしまう！'},
];
let cur=0,score=0,answered=false,chosen=-1;
function mkDots(){const d=document.getElementById('dots');d.innerHTML='';for(let i=0;i<TOTAL;i++){const e=document.createElement('div');e.className='dot'+(i===cur?' act':i<cur?' dn':'');d.appendChild(e);}}
function render(){
  document.getElementById('ph').textContent=phases[cur];
  document.getElementById('sl').textContent=(cur+1)+'/'+TOTAL;
  mkDots();const c=document.getElementById('content');
  if(cur===0){c.innerHTML=`<div class="card su" style="text-align:center;padding:32px 20px">
    <p style="font-size:12px;color:var(--sub);letter-spacing:.08em;margin:0 0 12px">簿記2級 × 引当金</p>
    <h1 style="font-size:21px;font-weight:700;line-height:1.6;margin:0 0 12px">30年後の退職金を、<br>なぜ今から計上する？</h1>
    <p style="font-size:15px;color:var(--sub);line-height:1.7;margin:0 0 24px">発生主義の考え方から<strong style="color:var(--text)">退職給付引当金の仕組み</strong>まで。</p>
    <button class="btn-full" onclick="go(1)">学習スタート →</button>
  </div>`;return;}
  if(cur>=1&&cur<=5){
    const s=stories[cur];let ex='';
    if(s.ex==='timeline')ex=`<div style="margin-top:12px;background:var(--bg);border-radius:12px;padding:14px;border:1px solid var(--border)">
      <p style="font-size:12px;color:var(--sub);margin:0 0 10px">毎年のイメージ（30年間）</p>
      ${['1年目','2年目','…','30年目'].map((y,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:5px 0;${i<3?'border-bottom:1px solid var(--border)':''}">
        <span style="font-size:12px;color:var(--sub);min-width:48px">${y}</span>
        <div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="width:${i===3?'100':i===2?'67':'33'}%;height:100%;background:var(--amber)"></div></div>
        <span style="font-size:12px;color:var(--amber);font-weight:600">${i===2?'…':'100,000円'}</span>
      </div>`).join('')}
      <p style="font-size:12px;color:var(--green);font-weight:600;margin-top:10px">合計：3,000,000円（退職金総額）</p>
    </div>`;
    c.innerHTML=`<div class="card su"><span class="badge ${s.bc}">${s.badge}</span>
    <div style="display:flex;gap:14px;align-items:flex-start">
      <div class="ibox">${s.icon}</div>
      <div style="flex:1"><h2 style="font-size:17px;font-weight:700;margin:0 0 8px">${s.title}</h2><p style="font-size:15px;color:var(--sub);line-height:1.7">${s.body}</p></div>
    </div>${ex}
    <div style="overflow:hidden"><button class="btn-next" onclick="go(${cur+1})">${cur===5?'仕訳を見る →':'次へ →'}</button></div></div>`;return;
  }
  if(cur===6){
    c.innerHTML=`<div class="card su"><span class="badge bp">仕訳アニメーション</span>
    <h2 style="font-size:17px;font-weight:700;margin:0 0 4px">退職給付引当金の2つの仕訳</h2>
    <p style="font-size:13px;color:var(--sub);margin:0 0 16px">年間計上額500,000円 ／ 退職時支払3,000,000円</p>

    <span class="jlbl">① 毎期末（引当金の設定）</span>
    <div class="tbl"><div style="display:grid;grid-template-columns:1fr 1px 1fr">
      <div class="tside"><p style="font-size:11px;color:var(--sub);text-align:center;margin:0 0 8px">借方</p>
        <div class="entry jl" id="j1"><span style="font-weight:600">退職給付費用</span><span style="color:var(--amber);font-weight:600">500,000</span></div></div>
      <div class="tdiv"></div>
      <div class="tside"><p style="font-size:11px;color:var(--sub);text-align:center;margin:0 0 8px">貸方</p>
        <div class="entry jr" id="j2"><span style="font-weight:600">退職給付引当金</span><span style="color:var(--green);font-weight:600">500,000</span></div></div>
    </div></div>

    <span class="jlbl" style="margin-top:14px;display:inline-block">② 退職金の支払時（引当金の取り崩し）</span>
    <div class="tbl"><div style="display:grid;grid-template-columns:1fr 1px 1fr">
      <div class="tside"><p style="font-size:11px;color:var(--sub);text-align:center;margin:0 0 8px">借方</p>
        <div class="entry jl" id="j3"><span style="font-weight:600">退職給付引当金</span><span style="color:var(--amber);font-weight:600">3,000,000</span></div></div>
      <div class="tdiv"></div>
      <div class="tside"><p style="font-size:11px;color:var(--sub);text-align:center;margin:0 0 8px">貸方</p>
        <div class="entry jr" id="j4"><span style="font-weight:600">現金</span><span style="color:var(--green);font-weight:600">3,000,000</span></div></div>
    </div></div>

    <div class="hint-box"><p style="font-size:13px;font-weight:700;margin:0 0 6px;color:#0F6E56">引っ掛けポイント</p>
    <p style="font-size:13px;color:var(--sub);line-height:1.6">退職金支払時の借方は「<strong style="color:var(--text)">退職給付引当金</strong>」。「退職給付費用」にすると毎期計上した費用と二重計上になる。「引当金があれば取り崩す」のが鉄則。</p></div>
    <div style="overflow:hidden"><button class="btn-next" onclick="go(7)">クイズへ →</button></div></div>`;
    setTimeout(()=>{
      ['j1','j2'].forEach((id,i)=>setTimeout(()=>{const e=document.getElementById(id);if(e)e.classList.add('sh');},i*400));
      ['j3','j4'].forEach((id,i)=>setTimeout(()=>{const e=document.getElementById(id);if(e)e.classList.add('sh');},1000+i*400));
    },150);return;
  }
  if(cur>=7&&cur<=9){
    const qi=cur-7,q=quiz[qi];let fb='';
    if(answered){const ok=chosen===q.ans;
      fb=`<div class="feedback ${ok?'ok':'ng'}"><p style="font-size:14px;font-weight:700;color:${ok?'#0F6E56':'#A32D2D'};margin:0 0 ${q.hint?'8px':'0'}">${ok?'✓ 正解！':`✗ 不正解。正解は「${q.opts[q.ans]}」`}</p>${q.hint?`<p style="font-size:13px;color:var(--sub);line-height:1.6;margin:0">💡 ${q.hint}</p>`:''}</div>
      <button class="btn-full" onclick="go(${cur+1})" style="margin-top:12px">${qi<2?'次の問題 →':'結果を見る →'}</button>`;}
    c.innerHTML=`<div class="card su">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <span class="badge bp" style="margin:0">Q${qi+1}</span>
      <span style="font-size:12px;color:var(--sub)">${qi+1}/3問</span>
      <div class="pbfill"><div class="pbbar" style="width:${qi/3*100}%"></div></div>
    </div>
    <p style="font-size:16px;font-weight:600;line-height:1.6;margin:0 0 16px">${q.q}</p>
    <div>${q.opts.map((o,i)=>{let cl='opt';if(answered){if(i===q.ans)cl+=' oc';else if(i===chosen)cl+=' ow';}
      return`<button class="${cl}" onclick="doAns(${qi},${i})" ${answered?'disabled':''}><span style="color:var(--sub);margin-right:8px;font-weight:400">${['A','B','C','D'][i]}.</span>${o}</button>`;
    }).join('')}</div>${fb}</div>`;return;
  }
  if(cur===10){
    const pct=Math.round(score/3*100);const col=score===3?'#1D9E75':score===2?'#BA7517':'#A32D2D';
    c.innerHTML=`<div class="card su" style="text-align:center;padding:28px 20px">
    <span class="badge ${score===3?'bt':'ba'}" style="margin-bottom:16px">${score===3?'完璧！':score===2?'あと少し！':'もう一回！'}</span>
    <div style="font-size:54px;font-weight:700;color:${col};margin:8px 0">${score}<span style="font-size:22px;color:var(--sub)">/3</span></div>
    <p style="color:var(--sub);margin:0 0 20px">${pct}% 正解</p>
    <div style="text-align:left;background:var(--bg);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:20px">
      <p style="font-size:13px;font-weight:700;margin:0 0 10px">今日の要点</p>
      <ul style="padding-left:20px;color:var(--sub);font-size:14px;line-height:2.2">
        <li>発生主義：退職金は労働期間に費用を配分</li>
        <li>毎期末 借方：退職給付費用 ／ 貸方：退職給付引当金</li>
        <li>支払時 借方：退職給付<strong style="color:var(--text)">引当金</strong> ／ 貸方：現金</li>
        <li>支払時に費用計上すると二重計上になる</li>
      </ul>
    </div>
    <button class="btn-full" onclick="restart()">最初からやり直す</button>
    </div>`;
  }
}
function go(n){cur=n;answered=false;chosen=-1;render();}
function doAns(qi,i){if(answered)return;answered=true;chosen=i;if(i===quiz[qi].ans)score++;render();}
function restart(){cur=0;score=0;answered=false;chosen=-1;render();}
render();
</script>
</body>
</html>
